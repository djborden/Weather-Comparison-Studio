<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Weather Comparison Studio</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 16px; max-width: 1400px; margin: 0 auto; }

    header { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); }

    .search-box { position: relative; width: 100%; max-width: 500px; }
    input[type="text"], input[type="date"] { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 0.95rem; outline: none; }
    input[type="text"] { width: 100%; }

    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; max-height: 220px; overflow-y: auto; z-index: 20; margin-top: 4px; display: none; }
    .result-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .result-item:hover { background: var(--border); }

    .date-bar { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }
    .date-inputs { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-muted); }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
    .btn:hover, .btn.active { background: var(--accent); color: #0f172a; font-weight: 600; border-color: var(--accent); }

    .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .panel h2 { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

    .toggle-list { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }

    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .2s; border-radius: 22px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(18px); }

    .delete-btn { background: transparent; border: none; color: #ef4444; font-size: 1rem; cursor: pointer; margin-left: 8px; }

    /* Summary Stats Grid with Live Weather Badge */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; border-top: 4px solid var(--accent); }
    .stat-card h3 { font-size: 0.95rem; color: var(--text); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .current-badge { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 6px; padding: 8px; margin-bottom: 8px; }
    .current-title { font-size: 0.75rem; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
    .current-temp-main { font-size: 1.1rem; font-weight: 700; color: #fff; }
    
    .stat-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    .stat-val { color: var(--text); font-weight: 600; }

    .chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; position: relative; height: 60vh; min-height: 420px; }
  </style>
</head>
<body>

  <header>
    <h1>Weather Comparison Studio</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Search city to add..." autocomplete="off" />
      <div id="searchResults" class="search-results"></div>
    </div>
  </header>

  <div class="date-bar">
    <div class="date-inputs">
      <label>From: <input type="date" id="startDate" /></label>
      <label>To: <input type="date" id="endDate" /></label>
      <button class="btn" id="applyDatesBtn">Apply Dates</button>
    </div>
    <div class="btn-group" id="presetBtnGroup">
      <button class="btn" onclick="setPresetRange(7, this)">7 Days</button>
      <button class="btn" onclick="setPresetRange(30, this)">30 Days</button>
      <button class="btn active" onclick="setPresetRange(90, this)">90 Days</button>
      <button class="btn" onclick="setPresetRange('ytd', this)">YTD</button>
      <button class="btn" onclick="setPresetRange(365, this)">1 Year</button>
    </div>
  </div>

  <div class="controls-grid">
    <div class="panel">
      <h2>Locations</h2>
      <div id="locationList" class="toggle-list"></div>
    </div>

    <div class="panel">
      <h2>Parameters</h2>
      <div id="paramList" class="toggle-list"></div>
    </div>
  </div>

  <div id="statsGrid" class="stats-grid"></div>

  <div class="chart-container">
    <canvas id="weatherChart"></canvas>
  </div>

  <script>
    const PARAMETERS = {
      temp_max: { name: "Max Temp (°F)", axis: "y" },
      feels_max: { name: "Max Feels Like (°F)", axis: "y" },
      temp_mean: { name: "Avg Temp (°F)", axis: "y" },
      feels_mean: { name: "Avg Feels Like (°F)", axis: "y" },
      temp_min: { name: "Low Temp (°F)", axis: "y" },
      feels_min: { name: "Low Feels Like (°F)", axis: "y" },
      dewpoint_mean: { name: "Avg Dew Point (°F)", axis: "y" },
      humidity_mean: { name: "Humidity (%)", axis: "y1" },
      precip_sum: { name: "Precipitation (in)", axis: "y1" },
      wind_max: { name: "Max Wind Gust (mph)", axis: "y1" }
    };

    const CITY_COLORS = [
      '#38bdf8', '#f87171', '#34d399', '#fbbf24', '#c084fc', '#fb923c', '#a3e635', '#f43f5e'
    ];

    let state = {
      locations: [
        { id: "fairfield", name: "Fairfield Glade, TN", lat: 35.9984, lon: -84.8872, active: true },
        { id: "farragut", name: "Farragut, TN", lat: 35.8845, lon: -84.1532, active: true },
        { id: "nashville", name: "Nashville, TN", lat: 36.1627, lon: -86.7816, active: true },
        { id: "hendersonville", name: "Hendersonville, NC", lat: 35.3187, lon: -82.4609, active: true },
        { id: "eldorado", name: "El Dorado, CA", lat: 38.6832, lon: -120.8441, active: true }
      ],
      params: {
        temp_max: true,
        feels_max: true,
        temp_min: false,
        feels_min: false,
        temp_mean: false,
        feels_mean: false,
        dewpoint_mean: false,
        humidity_mean: false,
        precip_sum: false,
        wind_max: false
      },
      startDate: "",
      endDate: "",
      cache: {},
      liveCache: {}
    };

    function getSafeArchiveDate() {
      const d = new Date();
      d.setDate(d.getDate() - 3);
      return d.toISOString().split('T')[0];
    }

    function calculateApparentTemp(tempF, rh, windMph) {
      if (tempF >= 80) {
        let hi = 0.5 * (tempF + 61.0 + ((tempF - 68.0) * 1.2) + (rh * 0.094));
        if (hi >= 80) {
          hi = -42.379 + 2.04901523*tempF + 10.14333127*rh - 0.22475541*tempF*rh 
               - 0.00683783*tempF*tempF - 0.05481717*rh*rh + 0.00122874*tempF*tempF*rh 
               + 0.00085282*tempF*rh*rh - 0.00000199*tempF*tempF*rh*rh;
          if (rh < 13 && tempF <= 112) {
            hi -= ((13 - rh)/4) * Math.sqrt((17 - Math.abs(tempF - 95.0))/17);
          } else if (rh > 85 && tempF <= 87) {
            hi += ((rh - 85)/10) * ((87 - tempF)/5);
          }
        }
        return Math.round(hi * 10) / 10;
      } 
      else if (tempF <= 50 && windMph > 3) {
        let wc = 35.74 + (0.6215 * tempF) - (35.75 * Math.pow(windMph, 0.16)) + (0.4275 * tempF * Math.pow(windMph, 0.16));
        return Math.round(wc * 10) / 10;
      }
      return tempF;
    }

    function initDates() {
      const safeEnd = getSafeArchiveDate();
      const past = new Date(safeEnd);
      past.setDate(past.getDate() - 90);
      
      state.endDate = safeEnd;
      state.startDate = past.toISOString().split('T')[0];

      document.getElementById('startDate').value = state.startDate;
      document.getElementById('endDate').value = state.endDate;
    }

    function saveState() {
      localStorage.setItem('weather_studio_v10_state', JSON.stringify({
        locations: state.locations,
        params: state.params
      }));
    }

    let chart = null;

    function initChart() {
      const ctx = document.getElementById('weatherChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top', labels: { color: '#f8fafc', font: { size: 11 } } },
            tooltip: {
              backgroundColor: '#1e293b',
              titleColor: '#38bdf8',
              bodyColor: '#f8fafc',
              borderColor: '#334155',
              borderWidth: 1,
              itemSort: function(a, b) { return b.raw - a.raw; }
            }
          },
          scales: {
            x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
            y: {
              type: 'linear', display: true, position: 'left',
              title: { display: true, text: 'Temperature (°F)', color: '#94a3b8' },
              ticks: { color: '#94a3b8' }, grid: { color: '#334155' }
            },
            y1: {
              type: 'linear', display: false, position: 'right',
              title: { display: true, text: 'Humidity (%) / Precip (in) / Wind (mph)', color: '#94a3b8' },
              ticks: { color: '#94a3b8' }, grid: { drawOnChartArea: false }
            }
          }
        }
      });
    }

    function setPresetRange(days, btnElement) {
      const btnGroup = document.getElementById('presetBtnGroup');
      const buttons = btnGroup.getElementsByClassName('btn');
      for (let btn of buttons) { btn.classList.remove('active'); }
      if (btnElement) { btnElement.classList.add('active'); }

      const safeEnd = getSafeArchiveDate();
      let start = new Date(safeEnd);
      
      if (days === 'ytd') {
        start = new Date(new Date().getFullYear(), 0, 1);
      } else {
        start.setDate(start.getDate() - days);
      }

      state.startDate = start.toISOString().split('T')[0];
      state.endDate = safeEnd;

      document.getElementById('startDate').value = state.startDate;
      document.getElementById('endDate').value = state.endDate;

      state.cache = {}; 
      updateData();
    }

    document.getElementById('applyDatesBtn').addEventListener('click', () => {
      const buttons = document.getElementById('presetBtnGroup').getElementsByClassName('btn');
      for (let btn of buttons) { btn.classList.remove('active'); }

      const safeEnd = getSafeArchiveDate();
      let userEnd = document.getElementById('endDate').value;
      
      if (userEnd > safeEnd) {
        userEnd = safeEnd;
        document.getElementById('endDate').value = safeEnd;
      }

      state.startDate = document.getElementById('startDate').value;
      state.endDate = userEnd;
      state.cache = {};
      updateData();
    });

    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    let debounceTimer;

    searchInput.addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      const query = e.target.value.trim();
      if (query.length < 2) { searchResults.style.display = 'none'; return; }

      debounceTimer = setTimeout(async () => {
        try {
          const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=en&format=json`);
          const data = await res.json();
          renderSearchResults(data.results || []);
        } catch(err) { console.error(err); }
      }, 300);
    });

    function renderSearchResults(results) {
      if (!results.length) { searchResults.style.display = 'none'; return; }
      searchResults.innerHTML = results.map(r => `
        <div class="result-item" data-name="${r.name}, ${r.admin1 || ''}" data-lat="${r.latitude}" data-lon="${r.longitude}">
          <strong>${r.name}</strong>, ${r.admin1 || ''} (${r.country_code || ''}) - Elev: ${Math.round((r.elevation || 0) * 3.28084)} ft
        </div>
      `).join('');
      searchResults.style.display = 'block';
    }

    searchResults.addEventListener('click', (e) => {
      const item = e.target.closest('.result-item');
      if (!item) return;

      const newLoc = {
        id: 'loc_' + Date.now(),
        name: item.dataset.name,
        lat: parseFloat(item.dataset.lat),
        lon: parseFloat(item.dataset.lon),
        active: true
      };

      state.locations.push(newLoc);
      saveState();
      renderControls();
      updateData();

      searchInput.value = '';
      searchResults.style.display = 'none';
    });

    function renderControls() {
      const locContainer = document.getElementById('locationList');
      locContainer.innerHTML = state.locations.map(loc => `
        <div class="toggle-row">
          <span>${loc.name}</span>
          <div style="display:flex; align-items:center;">
            <label class="switch">
              <input type="checkbox" ${loc.active ? 'checked' : ''} onchange="toggleLocation('${loc.id}')">
              <span class="slider"></span>
            </label>
            <button class="delete-btn" onclick="deleteLocation('${loc.id}')">✕</button>
          </div>
        </div>
      `).join('');

      const paramContainer = document.getElementById('paramList');
      paramContainer.innerHTML = Object.keys(PARAMETERS).map(key => `
        <div class="toggle-row">
          <span>${PARAMETERS[key].name}</span>
          <label class="switch">
            <input type="checkbox" ${state.params[key] ? 'checked' : ''} onchange="toggleParam('${key}')">
            <span class="slider"></span>
          </label>
        </div>
      `).join('');
    }

    function toggleLocation(id) {
      const loc = state.locations.find(l => l.id === id);
      if (loc) { 
        loc.active = !loc.active; 
        saveState(); 
        updateData(); 
      }
    }

    function deleteLocation(id) {
      delete state.cache[id];
      delete state.liveCache[id];
      state.locations = state.locations.filter(l => l.id !== id);
      saveState();
      renderControls();
      updateChart();
      renderSummaryCards();
    }

    function toggleParam(key) {
      state.params[key] = !state.params[key];
      saveState();
      updateChart();
    }

    // Fetch Historical Data and Live Current Conditions
    async function updateData() {
      const activeLocs = state.locations.filter(l => l.active);
      const hourlyParams = "temperature_2m,relative_humidity_2m,dew_point_2m,precipitation,wind_gusts_10m,wind_speed_10m";

      for (let loc of activeLocs) {
        // Fetch Real-Time Weather Conditions
        if (!state.liveCache[loc.id]) {
          const liveUrl = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`;
          try {
            const liveRes = await fetch(liveUrl);
            const liveData = await liveRes.json();
            if (liveData.current) {
              const curTemp = Math.round(liveData.current.temperature_2m);
              const curRh = liveData.current.relative_humidity_2m;
              const curWind = liveData.current.wind_speed_10m;
              const curFeels = Math.round(calculateApparentTemp(curTemp, curRh, curWind));
              state.liveCache[loc.id] = { temp: curTemp, feels: curFeels };
            }
          } catch(e) { console.error(`Live weather fetch error for ${loc.name}:`, e); }
        }

        // Fetch Verified Historical Data
        if (!state.cache[loc.id]) {
          const archiveUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${loc.lat}&longitude=${loc.lon}&start_date=${state.startDate}&end_date=${state.endDate}&hourly=${hourlyParams}&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`;
          try {
            const res = await fetch(archiveUrl);
            const data = await res.json();

            if (data.hourly && data.hourly.time && data.hourly.time.length > 0) {
              const processed = processHourlyToDaily(data);
              processed.elevation = data.elevation ? Math.round(data.elevation * 3.28084) : null;
              state.cache[loc.id] = processed;
            }
          } catch(e) { console.error(`Historical API failure for ${loc.name}:`, e); }
        }
      }
      updateChart();
      renderSummaryCards();
    }

    function processHourlyToDaily(data) {
      const times = data.hourly.time;
      const temps = data.hourly.temperature_2m;
      const rhs = data.hourly.relative_humidity_2m;
      const dews = data.hourly.dew_point_2m;
      const precips = data.hourly.precipitation;
      const winds = data.hourly.wind_gusts_10m;
      const windSpeeds = data.hourly.wind_speed_10m;

      const dailyMap = {};

      for (let i = 0; i < times.length; i++) {
        const dateStr = times[i].slice(0, 10);
        if (!dailyMap[dateStr]) {
          dailyMap[dateStr] = { temps: [], rhs: [], dews: [], precips: [], winds: [], feels: [] };
        }
        
        const t = temps[i];
        const rh = rhs[i];
        const w = windSpeeds[i] || 0;
        const appTemp = calculateApparentTemp(t, rh, w);

        if (t !== null && t !== undefined) dailyMap[dateStr].temps.push(t);
        if (rh !== null && rh !== undefined) dailyMap[dateStr].rhs.push(rh);
        if (dews[i] !== null && dews[i] !== undefined) dailyMap[dateStr].dews.push(dews[i]);
        dailyMap[dateStr].precips.push(precips[i] || 0);
        dailyMap[dateStr].winds.push(winds[i] || 0);
        dailyMap[dateStr].feels.push(appTemp);
      }

      const days = Object.keys(dailyMap).sort();
      const result = {
        dates: days,
        dailyMap: {},
        temp_max: [], temp_min: [], temp_mean: [],
        feels_max: [], feels_min: [], feels_mean: [], dewpoint_mean: [], humidity_mean: [],
        precip_sum: [], wind_max: []
      };

      days.forEach(d => {
        const obj = dailyMap[d];
        if (!obj.temps.length) return;

        const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0) / arr.length : 0;
        const sum = arr => arr.reduce((a,b)=>a+b,0);

        const dayMetrics = {
          temp_max: Math.round(Math.max(...obj.temps)),
          temp_min: Math.round(Math.min(...obj.temps)),
          temp_mean: Math.round(avg(obj.temps)),
          feels_max: Math.round(Math.max(...obj.feels)),
          feels_min: Math.round(Math.min(...obj.feels)),
          feels_mean: Math.round(avg(obj.feels)),
          dewpoint_mean: Math.round(avg(obj.dews)),
          humidity_mean: Math.round(avg(obj.rhs)),
          precip_sum: Math.round(sum(obj.precips) * 100) / 100,
          wind_max: Math.round(Math.max(...obj.winds))
        };

        result.dailyMap[d] = dayMetrics;
        result.temp_max.push(dayMetrics.temp_max);
        result.temp_min.push(dayMetrics.temp_min);
        result.temp_mean.push(dayMetrics.temp_mean);
        result.feels_max.push(dayMetrics.feels_max);
        result.feels_min.push(dayMetrics.feels_min);
        result.feels_mean.push(dayMetrics.feels_mean);
        result.dewpoint_mean.push(dayMetrics.dewpoint_mean);
        result.humidity_mean.push(dayMetrics.humidity_mean);
        result.precip_sum.push(dayMetrics.precip_sum);
        result.wind_max.push(dayMetrics.wind_max);
      });

      return result;
    }

    function renderSummaryCards() {
      const container = document.getElementById('statsGrid');
      const activeLocs = state.locations.filter(l => l.active);

      container.innerHTML = activeLocs.map((loc) => {
        const d = state.cache[loc.id];
        const live = state.liveCache[loc.id];
        if (!d) return '';

        const globalIdx = state.locations.findIndex(l => l.id === loc.id);
        const color = CITY_COLORS[globalIdx % CITY_COLORS.length];
        
        const avgHigh = d.temp_max.length ? Math.round(d.temp_max.reduce((a,b)=>a+b,0)/d.temp_max.length) : '-';
        const avgLow = d.temp_min.length ? Math.round(d.temp_min.reduce((a,b)=>a+b,0)/d.temp_min.length) : '-';
        const totalRain = d.precip_sum.length ? (d.precip_sum.reduce((a,b)=>a+b,0)).toFixed(2) : '-';
        const elev = d.elevation ? `${d.elevation} ft` : 'N/A';

        const liveHtml = live 
          ? `<div class="current-badge">
               <div class="current-title">⚡ Right Now</div>
               <div class="current-temp-main">${live.temp}°F <span style="font-size: 0.85rem; font-weight: normal; color: var(--text-muted);">(Feels like ${live.feels}°F)</span></div>
             </div>`
          : '';

        return `
          <div class="stat-card" style="border-top-color: ${color}">
            <h3>${loc.name}</h3>
            ${liveHtml}
            <div class="stat-row"><span>Elevation:</span><span class="stat-val">${elev}</span></div>
            <div class="stat-row"><span>Avg High:</span><span class="stat-val">${avgHigh}°F</span></div>
            <div class="stat-row"><span>Avg Low:</span><span class="stat-val">${avgLow}°F</span></div>
            <div class="stat-row"><span>Total Rain:</span><span class="stat-val">${totalRain} in</span></div>
          </div>
        `;
      }).join('');
    }

    function updateChart() {
      const activeLocs = state.locations.filter(l => l.active);
      const activeParams = Object.keys(state.params).filter(k => state.params[k]);

      if (!activeLocs.length || !activeParams.length) {
        chart.data.labels = [];
        chart.data.datasets = [];
        chart.update();
        return;
      }

      const allDatesSet = new Set();
      activeLocs.forEach(loc => {
        if (state.cache[loc.id] && state.cache[loc.id].dates) {
          state.cache[loc.id].dates.forEach(d => allDatesSet.add(d));
        }
      });

      const masterDates = Array.from(allDatesSet).sort();
      chart.data.labels = masterDates;

      const datasets = [];
      let hasSecondaryAxis = false;

      activeLocs.forEach((loc) => {
        const dataObj = state.cache[loc.id];
        if (!dataObj || !dataObj.dailyMap) return;

        const globalLocIdx = state.locations.findIndex(l => l.id === loc.id);
        const baseColor = CITY_COLORS[globalLocIdx % CITY_COLORS.length];

        activeParams.forEach((paramKey) => {
          const meta = PARAMETERS[paramKey];
          if (meta.axis === 'y1') hasSecondaryAxis = true;

          const alignedData = masterDates.map(date => {
            const dayEntry = dataObj.dailyMap[date];
            return dayEntry ? dayEntry[paramKey] : null;
          });

          datasets.push({
            label: `${loc.name} - ${meta.name}`,
            data: alignedData,
            borderColor: baseColor,
            backgroundColor: baseColor,
            borderDash: paramKey.includes('feels') ? [4, 4] : [],
            yAxisID: meta.axis,
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 5,
            tension: 0.2,
            spanGaps: true
          });
        });
      });

      chart.options.scales.y1.display = hasSecondaryAxis;
      chart.data.datasets = datasets;
      chart.update();
    }

    initDates();
    initChart();
    renderControls();
    updateData();
  </script>
</body>
</html>
